<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draw a blue rectangle (canvas version)</title>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    <script src="asgn0.js"></script>
    <script src="lib/cuon-matrix-cse160.js"></script>

    <br><br>
    <label for="vector1">V1</label>
    
    <label for="vector1x">x:</label>
    <input type="number" id="vector1x" name="vector1x">
    
    <label for="vector1y">y:</label>
    <input type="number" id="vector1y" name="vector1y">
    
    <br><br>
    <label for="vector2">V2</label>

    <label for="vector2x">x:</label>
    <input type="number" id="vector2x" name="vector2x">
    
    <label for="vector2y">y:</label>
    <input type="number" id="vector2y" name="vector2y">

    <br><br>
    <label for="operation">Operation:</label>
    <select name="operation" id="operation">
      <option value="">--Please choose an option --</option>
      <option value="add">Add</option>
      <option value="sub">Subtract</option>
      <option value="mul">Multiply</option>
      <option value="div">Divide</option>
      <option value="normalize">Normalize</option>
      <option value="magnitude">Magnitude</option>
      <option value="angleBetween">Angle Between</option>
      <option value="area">Area</option>
    </select>

    <br><br>
    <input type="button" value="Draw" onclick="handleDrawEvent()"></input>
  </body>
</html>
